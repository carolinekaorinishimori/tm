<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Teachable Machine Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #ec4899;
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --text: #f9fafb;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        .orb-1 {
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: var(--panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .control-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 18px 25px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px -5px var(--primary-glow);
            filter: brightness(1.2);
        }

        .start-btn:active { transform: translateY(0) scale(0.98); }

        .start-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        @media (max-width: 950px) {
            .main-grid { grid-template-columns: 1fr; }
            .container { padding: 30px; border-radius: 24px; }
            h1 { font-size: 2.5rem; }
        }

        .viewer-box {
            background: #000;
            border-radius: 30px;
            aspect-ratio: 16/10;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid rgba(255, 255, 255, 0.08);
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            z-index: 10;
            display: none;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .empty-view {
            color: var(--text-dim);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .empty-view svg { opacity: 0.3; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .prediction-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .prediction-card.active {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.4);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: var(--percentage, 0%);
            transition: width 0.15s ease-out;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .class-label {
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        .prob-value {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--primary);
        }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <h1>Neural Pulse</h1>
            <p>Advanced Real-time Computer Vision</p>
        </header>

        <section class="control-panel">
            <p style="font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary);">Model Source Configuration</p>
            <div class="input-group">
                <input type="text" id="model-url" placeholder="Enter remote URL or local path (e.g., ./my_model/)" value="./my_model/">
                <button class="start-btn" id="init-btn" onclick="init()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Initialize Matrix
                </button>
            </div>
        </section>

        <div class="main-grid">
            <div class="viewer-box">
                <div class="scan-line" id="scanner"></div>
                <div id="webcam-container">
                    <div class="empty-view">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p>Awaiting Uplink Initialization...</p>
                    </div>
                </div>
            </div>

            <div class="results-panel" id="label-container">
                <!-- Predictive data streams here -->
            </div>
        </div>

        <p class="footer-note">Powered by TensorFlow.js & Google Teachable Machine</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const btn = document.getElementById('init-btn');
            let URL = document.getElementById('model-url').value.trim();
            
            if (!URL) {
                alert("Please specify a model path or URL.");
                return;
            }
            
            if (!URL.endsWith('/')) URL += '/';

            try {
                btn.disabled = true;
                btn.innerHTML = "Syncing Neural Network...";
                
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // Load the model
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Setup Webcam
                const flip = true;
                webcam = new tmImage.Webcam(400, 400, flip);
                await webcam.setup();
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                // Update UI
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                document.getElementById("scanner").style.display = "block";
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    const card = document.createElement("div");
                    card.className = "prediction-card";
                    card.innerHTML = `
                        <div class="card-content">
                            <span class="class-label">Analyzing...</span>
                            <span class="prob-value">0%</span>
                        </div>
                        <div class="card-progress"></div>
                    `;
                    labelContainer.appendChild(card);
                }
                
                btn.innerHTML = "Matrix Linked";
            } catch (e) {
                console.error(e);
                alert("Initialization Failed: Could not find model files at the specified location. Ensure your 'my_model' folder contains model.json and metadata.json.");
                btn.disabled = false;
                btn.innerHTML = 'Initialize Matrix';
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const card = labelContainer.childNodes[i];
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0);
                
                card.querySelector(".class-label").innerText = prediction[i].className;
                card.querySelector(".prob-value").innerText = percentage + "%";
                card.style.setProperty('--percentage', percentage + "%");
                
                // Visual feedback for high confidence
                if (probability > 0.85) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            }
        }
    </script>
</body>
</html>
