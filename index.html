<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Frog vs Mouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --primary-glow: rgba(192, 132, 252, 0.4);
            --secondary: #fb7185;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --frog-green: #4ade80;
            --mouse-gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            transition: background 0.5s;
        }

        .orb {
            position: fixed;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.25;
            animation: move 25s infinite alternate ease-in-out;
            transition: all 1s;
        }

        .orb-1 {
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            top: -20%; left: -10%;
        }

        .orb-2 {
            background: radial-gradient(circle, #be185d 0%, transparent 70%);
            bottom: -20%; right: -10%;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: var(--panel);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 40px; }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.06em;
            background: linear-gradient(135deg, #fff 40%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Detection Spotlight */
        #detection-spotlight {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
        }

        #detection-text {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .upload-section {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            position: relative;
        }

        #file-input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }

        .btn-start {
            margin-top: 20px;
            background: var(--primary);
            color: white; border: none; padding: 15px 40px; border-radius: 12px;
            font-weight: 700; cursor: pointer; opacity: 0.5; pointer-events: none;
        }

        .btn-start.active { opacity: 1; pointer-events: all; }

        .main-view {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        @media (max-width: 900px) { .main-view { grid-template-columns: 1fr; } }

        .camera-box {
            background: #000;
            border-radius: 24px;
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            border: 4px solid rgba(255, 255, 255, 0.05);
        }

        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }

        .hud-overlay {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #fff;
        }

        .classes-list { display: flex; flex-direction: column; gap: 12px; }

        .class-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            bottom: 0; left: 0; height: 4px;
            background: var(--primary);
            width: var(--p, 0%);
            transition: width 0.1s;
        }

        .label-wrap { display: flex; justify-content: space-between; align-items: center; }
        .label-name { font-weight: 600; font-size: 1.1rem; }
        .label-perc { font-family: monospace; font-weight: 800; color: var(--primary); }

        /* Dynamic Themes */
        .theme-frog #detection-spotlight { border-color: var(--frog-green); background: rgba(74, 222, 128, 0.1); }
        .theme-frog #detection-text { color: var(--frog-green); }
        .theme-frog .orb-1 { background: radial-gradient(circle, var(--frog-green) 0%, transparent 70%); }

        .theme-mouse #detection-spotlight { border-color: #fff; background: rgba(255, 255, 255, 0.1); }
        .theme-mouse #detection-text { color: #fff; text-shadow: 0 0 15px #fff; }
        .theme-mouse .orb-2 { background: radial-gradient(circle, #fff 0%, transparent 70%); }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <h1>Specimen Analysis</h1>
            <p>Frog & Mouse Detection Protocol</p>
        </header>

        <div id="detection-spotlight">
            <span id="detection-text">Awaiting Input...</span>
        </div>

        <section class="upload-section" id="drop-zone">
            <input type="file" id="file-input" multiple>
            <div class="upload-content">
                <h3>Load Local Model</h3>
                <p>Select model.json, metadata.json, and weights.bin</p>
                <button class="btn-start" id="start-btn">INITIALIZE AI</button>
            </div>
        </section>

        <div class="main-view">
            <div class="camera-box">
                <div class="hud-overlay">LIVE NEURAL FEED</div>
                <div id="webcam-container"></div>
            </div>

            <div class="classes-list" id="label-container">
                <!-- Predictive data -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        const dropZone = document.getElementById('drop-zone');
        const detectionText = document.getElementById('detection-text');
        
        let model, webcam, labelContainer, maxPredictions;
        let files = {};

        fileInput.addEventListener('change', (e) => {
            for (let file of e.target.files) {
                if (file.name.includes('metadata')) files.metadata = file;
                else if (file.name.endsWith('.json')) files.model = file;
                else if (file.name.endsWith('.bin')) files.weights = file;
            }
            if (files.model && files.metadata && files.weights) {
                startBtn.classList.add('active');
                detectionText.innerText = "Package Ready";
            }
        });

        startBtn.addEventListener('click', init);

        async function init() {
            model = await tmImage.loadFromFiles(files.model, files.weights, files.metadata);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(400, 400, true);
            await webcam.setup();
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            dropZone.style.display = "none";
            
            labelContainer = document.getElementById('label-container');
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "class-card";
                div.innerHTML = `<div class="label-wrap"><span class="label-name">...</span><span class="label-perc">0%</span></div><div class="progress-fill"></div>`;
                labelContainer.appendChild(div);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let topClass = "";
            let topProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const prob = prediction[i].probability;
                const className = prediction[i].className;
                const item = labelContainer.childNodes[i];
                
                item.querySelector('.label-name').innerText = className;
                item.querySelector('.label-perc').innerText = (prob * 100).toFixed(0) + "%";
                item.style.setProperty('--p', (prob * 100).toFixed(0) + "%");

                if (prob > topProb) {
                    topProb = prob;
                    topClass = className;
                }
            }

            // Update Spotlight if confidence is high enough
            if (topProb > 0.6) {
                detectionText.innerText = "Detected: " + topClass;
                
                // Trigger Visual Effects based on class name
                const lowerClass = topClass.toLowerCase();
                document.body.className = ""; // reset
                if (lowerClass.includes("frog")) document.body.classList.add("theme-frog");
                else if (lowerClass.includes("mouse")) document.body.classList.add("theme-mouse");
            } else {
                detectionText.innerText = "Analyzing...";
                document.body.className = "";
            }
        }
    </script>
</body>
</html>
