<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Teachable Machine Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #ec4899;
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --text: #f9fafb;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .orb-1 {
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .setup-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            filter: brightness(1.1);
        }

        button:active { transform: translateY(0); }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .container { padding: 30px; }
        }

        .webcam-box {
            background: #000;
            border-radius: 24px;
            aspect-ratio: 4/3;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .placeholder {
            color: var(--text-dim);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .predictions-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .prediction-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .prediction-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: var(--primary);
            width: var(--width, 0%);
            transition: width 0.2s ease-out;
            box-shadow: 0 0 10px var(--primary);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .class-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .percentage {
            font-family: monospace;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <h1>Vision Matrix</h1>
            <p>Real-time neural recognition with Teachable Machine</p>
        </header>

        <section class="setup-card">
            <p style="font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary);">Step 1: Deployment</p>
            <div class="input-wrapper">
                <input type="text" id="model-url" placeholder="Paste your export URL here...">
                <button onclick="startSession()">Initialize AI</button>
            </div>
        </section>

        <div class="main-grid">
            <div class="webcam-box" id="webcam-container">
                <div class="placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>Awaiting Camera Access...</p>
                </div>
            </div>

            <div class="predictions-box" id="label-container">
                <!-- Predictions will appear here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        let model, webcam, labelContainer, maxPredictions;

        async function startSession() {
            const btn = document.querySelector('button');
            let URL = document.getElementById('model-url').value.trim();
            
            if (!URL) {
                alert("Please provide a valid Teachable Machine URL.");
                return;
            }
            
            if (!URL.endsWith('/')) URL += '/';

            try {
                btn.disabled = true;
                btn.innerHTML = "Loading Model...";
                
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(400, 400, flip);
                await webcam.setup();
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                // Setup Canvas
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                // Init Labels
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "prediction-item";
                    div.innerHTML = `
                        <div class="label-row">
                            <span class="class-name">Loading...</span>
                            <span class="percentage">0%</span>
                        </div>
                        <div class="progress-bar"></div>
                    `;
                    labelContainer.appendChild(div);
                }
                
                btn.innerHTML = "System Online";
            } catch (e) {
                console.error(e);
                alert("Error: Verification failed. Ensure the URL is correct and public.");
                btn.disabled = false;
                btn.innerHTML = "Initialize AI";
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const item = labelContainer.childNodes[i];
                const probability = prediction[i].probability.toFixed(2);
                const perc = (probability * 100).toFixed(0);
                
                item.querySelector(".class-name").innerText = prediction[i].className;
                item.querySelector(".percentage").innerText = perc + "%";
                item.style.setProperty('--width', perc + "%");
                
                if (probability > 0.8) {
                    item.style.borderColor = "var(--primary)";
                } else {
                    item.style.borderColor = "rgba(255, 255, 255, 0.05)";
                }
            }
        }
    </script>
</body>
</html>
